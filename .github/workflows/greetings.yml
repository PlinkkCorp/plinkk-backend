name: Greetings

on: [pull_request_target, issues]

jobs:
  greeting:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
    - uses: actions/first-interaction@v1
      with:
        repo-token: ${{ secrets.GITHUB_TOKEN }}
        issue-message: "Salut @${{ github.actor }}, merci d'avoir ouvert ta première issue !"
        pr-message: "Bienvenue @${{ github.actor }} ! Merci pour cette première PR !"
